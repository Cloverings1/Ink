<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none" role="img" aria-label="Ink banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070709"/>
      <stop offset="45%" stop-color="#101015"/>
      <stop offset="100%" stop-color="#16161d"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 80) rotate(18) scale(420 260)">
      <stop stop-color="#ff4b4b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff4b4b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 240) rotate(-12) scale(380 220)">
      <stop stop-color="#7c9cff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7c9cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#f5f5f7"/>
      <stop offset="100%" stop-color="#c7c7cc"/>
      <animate attributeName="x1" values="0;0.25;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;1.25;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="t"/>
      <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0.035 0"/>
    </filter>
    <clipPath id="round">
      <rect width="1200" height="320" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="320" fill="url(#bg)"/>
    <rect width="1200" height="320" fill="url(#glowA)"/>
    <rect width="1200" height="320" fill="url(#glowB)"/>
    <rect width="1200" height="120" fill="url(#sheen)"/>
    <rect width="1200" height="320" filter="url(#noise)" opacity="0.55"/>

    <g opacity="0.35" stroke="#ffffff" stroke-opacity="0.08">
      <path d="M0 240H1200"/>
      <path d="M0 180H1200"/>
      <path d="M0 120H1200"/>
      <path d="M0 60H1200"/>
    </g>

    <circle cx="1040" cy="58" r="120" fill="#ff4b4b" opacity="0.05">
      <animate attributeName="cy" values="58;64;58" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="260" r="90" fill="#7c9cff" opacity="0.05">
      <animate attributeName="cy" values="260;252;260" dur="7s" repeatCount="indefinite"/>
    </circle>

    <text x="600" y="142" text-anchor="middle" fill="url(#title)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica Neue,sans-serif" font-size="72" font-weight="650" letter-spacing="-2">Ink</text>
    <text x="600" y="188" text-anchor="middle" fill="#8e8e93" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica Neue,sans-serif" font-size="22" font-weight="500" letter-spacing="0.2">Floating notes for macOS</text>

    <g transform="translate(600 238)" opacity="0.9">
      <rect x="-210" y="-18" width="420" height="36" rx="18" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="0" y="6" text-anchor="middle" fill="#d1d1d6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">N create  ·  P browse  ·  K actions  ·  plain .md files</text>
    </g>
  </g>
</svg>
