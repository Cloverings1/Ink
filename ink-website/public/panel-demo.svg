<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" fill="none" role="img" aria-label="Ink floating panel demo">
  <defs>
    <linearGradient id="desktop" x1="0" y1="0" x2="920" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0b0e"/>
      <stop offset="100%" stop-color="#15151b"/>
    </linearGradient>
    <linearGradient id="wall" x1="460" y1="40" x2="460" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff4b4b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c9cff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="panelShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="glass" x1="460" y1="120" x2="460" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <clipPath id="panelClip">
      <rect x="210" y="110" width="500" height="340" rx="22"/>
    </clipPath>
  </defs>

  <rect width="920" height="560" rx="28" fill="url(#desktop)"/>
  <rect width="920" height="560" rx="28" fill="url(#wall)"/>

  <g opacity="0.35" filter="url(#blur)">
    <rect x="80" y="70" width="760" height="46" rx="10" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="80" y="140" width="520" height="18" rx="9" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="80" y="176" width="680" height="18" rx="9" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="80" y="212" width="610" height="18" rx="9" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="80" y="248" width="700" height="18" rx="9" fill="#ffffff" fill-opacity="0.04"/>
  </g>

  <g filter="url(#panelShadow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="5s" repeatCount="indefinite"/>
      <rect x="210" y="110" width="500" height="340" rx="22" fill="#1c1c22" fill-opacity="0.92" stroke="#ffffff" stroke-opacity="0.14"/>
      <rect x="210" y="110" width="500" height="340" rx="22" fill="url(#glass)"/>
    </g>
  </g>

  <g clip-path="url(#panelClip)">
    <rect x="210" y="110" width="500" height="52" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="236" cy="136" r="6" fill="#ff5f57"/>
    <circle cx="258" cy="136" r="6" fill="#febc2e"/>
    <circle cx="280" cy="136" r="6" fill="#28c840"/>
    <text x="460" y="141" text-anchor="middle" fill="#f5f5f7" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">Ink</text>

    <text x="236" y="198" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="24" font-weight="650">Meeting notes</text>
    <text x="236" y="236" fill="#a1a1a6" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15">Capture ideas without leaving the app you're in.</text>
    <text x="236" y="278" fill="#d1d1d6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">- Ship the floating panel polish</text>
    <text x="236" y="304" fill="#d1d1d6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">- Keep notes as plain Markdown files</text>
    <text x="236" y="330" fill="#d1d1d6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">- Auto-save to ~/Library/.../Ink/Notes</text>

    <rect x="236" y="346" width="2" height="18" fill="#ff4b4b">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <rect x="210" y="392" width="500" height="58" fill="#ffffff" fill-opacity="0.04"/>
    <g fill="#ebebf0" fill-opacity="0.75" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600">
      <text x="248" y="428">B</text>
      <text x="286" y="428">I</text>
      <text x="324" y="428">H</text>
      <text x="362" y="428">"</text>
      <text x="400" y="428">[]</text>
      <text x="438" y="428"></text>
    </g>
    <text x="668" y="428" text-anchor="end" fill="#8e8e93" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">saved</text>
  </g>

  <g transform="translate(760 88)">
    <rect x="-54" y="-18" width="108" height="36" rx="18" fill="#ff4b4b" fill-opacity="0.16" stroke="#ff4b4b" stroke-opacity="0.35">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="5" text-anchor="middle" fill="#ffb4b4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="600">N</text>
  </g>
</svg>
